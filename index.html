<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NCAA Half-Score Predictor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding-bottom:40px}
.container{max-width:480px;margin:0 auto;padding:16px}
.header{text-align:center;padding:20px 0 8px}
.header h1{font-size:1.3rem;font-weight:800;color:#f8fafc;letter-spacing:-0.01em}
.header p{font-size:0.8rem;color:#475569;margin-top:4px}
.card{background:#1e293b;border-radius:14px;padding:16px;margin-bottom:14px}
.card-title{font-size:0.7rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}
label{font-size:0.875rem;font-weight:500;color:#94a3b8;display:block;margin-bottom:6px}
.input-wrap{position:relative;margin-bottom:10px}
input[type=text]{width:100%;padding:11px 14px;border:1.5px solid #334155;border-radius:10px;background:#0f172a;color:#f1f5f9;font-size:1rem;outline:none;transition:border-color .15s}
input[type=text]:focus{border-color:#3b82f6}
.chip{display:inline-block;background:#1d4ed8;color:#bfdbfe;padding:5px 12px;border-radius:99px;font-size:0.85rem;margin-top:5px;font-weight:500}
.chip .x{margin-left:8px;cursor:pointer;opacity:.7}
.chip .x:hover{opacity:1}
.ddlist{position:absolute;z-index:200;width:100%;background:#1e293b;border:1.5px solid #334155;border-radius:10px;max-height:220px;overflow-y:auto;top:calc(100% + 4px);display:none;box-shadow:0 10px 30px #0008}
.ddlist.open{display:block}
.ddi{padding:11px 14px;cursor:pointer;font-size:0.9rem;color:#e2e8f0}
.ddi:hover,.ddi.hl{background:#1d4ed8;color:#fff}
.round-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.round-btn{padding:9px 4px;border:1.5px solid #334155;border-radius:9px;background:#0f172a;color:#64748b;font-size:0.72rem;cursor:pointer;text-align:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
.round-btn:hover{border-color:#475569;color:#94a3b8}
.round-btn.active{background:#1d4ed8;border-color:#3b82f6;color:#93c5fd;font-weight:600}
#results{display:none}
.pred-matchup{text-align:center;font-size:0.8rem;color:#64748b;margin-bottom:14px}
.pred-matchup strong{color:#cbd5e1;font-size:0.9rem}
.pred-row{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 0;border-bottom:1px solid #0f172a}
.pred-row:last-child{border-bottom:none;padding-top:14px;margin-top:4px;border-top:1px solid #334155}
.pred-lbl{font-size:0.85rem;color:#64748b;padding-top:4px}
.pred-right{text-align:right}
.pred-val{font-size:1.6rem;font-weight:700;color:#f1f5f9;line-height:1}
.pred-total{font-size:1.9rem;font-weight:800;color:#60a5fa;line-height:1}
.pi50{font-size:0.72rem;color:#fbbf24;margin-top:3px}
.pi90{font-size:0.72rem;color:#475569;margin-top:1px}
.note{font-size:0.7rem;color:#334155;text-align:center;margin-top:6px;line-height:1.4}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>2026 NCAA Tournament</h1>
    <p>Half-score predictor &mdash; Ridge regression model</p>
  </div>

  <div class="card">
    <div class="card-title">Teams</div>
    <div class="input-wrap" id="wrapA">
      <label>Team A</label>
      <input type="text" id="inA" placeholder="Search team&hellip;" autocomplete="off">
      <div class="ddlist" id="listA"></div>
      <div id="chipA"></div>
    </div>
    <div class="input-wrap" id="wrapB">
      <label>Team B</label>
      <input type="text" id="inB" placeholder="Search team&hellip;" autocomplete="off">
      <div class="ddlist" id="listB"></div>
      <div id="chipB"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Round</div>
    <div class="round-grid">
      <button class="round-btn" data-ord="0">First Four</button>
      <button class="round-btn active" data-ord="1">1st Round</button>
      <button class="round-btn" data-ord="2">2nd Round</button>
      <button class="round-btn" data-ord="3">Sweet 16</button>
      <button class="round-btn" data-ord="4">Elite Eight</button>
      <button class="round-btn" data-ord="5">Final Four</button>
      <button class="round-btn" data-ord="6" style="grid-column:span 3">Championship</button>
    </div>
  </div>

  <div class="card" id="results">
    <div class="card-title">Prediction</div>
    <div class="pred-matchup" id="matchupLbl"></div>
    <div class="pred-row">
      <span class="pred-lbl">H1 Total</span>
      <div class="pred-right">
        <div class="pred-val" id="h1val"></div>
        <div class="pi50" id="h1pi50"></div>
        <div class="pi90" id="h1pi90"></div>
      </div>
    </div>
    <div class="pred-row">
      <span class="pred-lbl">H2 Total</span>
      <div class="pred-right">
        <div class="pred-val" id="h2val"></div>
        <div class="pi50" id="h2pi50"></div>
        <div class="pi90" id="h2pi90"></div>
      </div>
    </div>
    <div class="pred-row">
      <span class="pred-lbl" style="font-weight:600;color:#94a3b8">Full Game</span>
      <div class="pred-right">
        <div class="pred-total" id="totval"></div>
        <div class="pi50" id="totpi50"></div>
        <div class="pi90" id="totpi90"></div>
      </div>
    </div>
    <p class="note">Predictions based on LOSO CV (2015&ndash;2025, n=665). H1 MAE&asymp;8.2 pts, H2 MAE&asymp;8.8 pts.</p>
  </div>
</div>

const TNAMES=Object.keys(TEAMS);

let selA=null,selB=null,roundOrd=1;

function computeFeats(a,b,r){
  const sad=a.adj_d+b.adj_d,sao=a.adj_o+b.adj_o;
  const aoe=(a.off_efg+b.off_efg)/2,aoor=(a.off_orb+b.off_orb)/2;
  const sc=aoor*aoe;
  const ade=(a.def_efg+b.def_efg)/2,adob=(a.def_orb+b.def_orb)/2;
  const adftr=(a.def_ftr+b.def_ftr)/2,aoftr=(a.off_ftr+b.off_ftr)/2;
  const tdiff=Math.abs(a.adj_t-b.adj_t),bdiff=Math.abs(a.barthag-b.barthag);
  const adtor=(a.def_to_rate+b.def_to_rate)/2;
  const odm=(a.adj_o-b.adj_d)+(b.adj_o-a.adj_d);
  const dp=adtor*ade,awab=(a.wab+b.wab)/2,er=sao/sad;
  return{
    h1:[sad,sao,sc,ade,bdiff,adob,adftr,tdiff,aoftr,adtor,odm],
    h2:[sao,sad,ade,sc,tdiff,dp,adob,awab,r,odm,er]
  };
}

function ridge(feats,m){
  let y=m.intercept;
  for(let i=0;i<feats.length;i++) y+=m.coef[i]*(feats[i]-m.scaler_mean[i])/m.scaler_std[i];
  return y;
}

function f(v){return v.toFixed(1)}

function predict(){
  if(!selA||!selB||selA===selB)return;
  const a=TEAMS[selA],b=TEAMS[selB];
  const {h1:f1,h2:f2}=computeFeats(a,b,roundOrd);
  const h1=ridge(f1,MODEL.h1),h2=ridge(f2,MODEL.h2),tot=h1+h2;
  const pi=MODEL.prediction_intervals;
  const h1lo50=h1+pi.h1.pi50.lower_offset,h1hi50=h1+pi.h1.pi50.upper_offset;
  const h1lo90=h1+pi.h1.pi90.lower_offset,h1hi90=h1+pi.h1.pi90.upper_offset;
  const h2lo50=h2+pi.h2.pi50.lower_offset,h2hi50=h2+pi.h2.pi50.upper_offset;
  const h2lo90=h2+pi.h2.pi90.lower_offset,h2hi90=h2+pi.h2.pi90.upper_offset;
  document.getElementById('matchupLbl').innerHTML=`<strong>${selA}</strong> vs <strong>${selB}</strong>`;
  document.getElementById('h1val').textContent=f(h1);
  document.getElementById('h1pi50').textContent=`50% → ${f(h1lo50)}–${f(h1hi50)}`;
  document.getElementById('h1pi90').textContent=`90% → ${f(h1lo90)}–${f(h1hi90)}`;
  document.getElementById('h2val').textContent=f(h2);
  document.getElementById('h2pi50').textContent=`50% → ${f(h2lo50)}–${f(h2hi50)}`;
  document.getElementById('h2pi90').textContent=`90% → ${f(h2lo90)}–${f(h2hi90)}`;
  const tv=document.getElementById('totval');
  tv.className='pred-total';tv.textContent=f(tot);
  document.getElementById('totpi50').textContent=`50% → ${f(h1lo50+h2lo50)}–${f(h1hi50+h2hi50)}`;
  document.getElementById('totpi90').textContent=`90% → ${f(h1lo90+h2lo90)}–${f(h1hi90+h2hi90)}`;
  document.getElementById('results').style.display='block';
}

function buildDrop(inId,listId,chipId,onSel){
  const inp=document.getElementById(inId);
  const lst=document.getElementById(listId);
  const chp=document.getElementById(chipId);
  let hi=-1;

  function matches(q){
    const lq=q.toLowerCase();
    return q.length<1?TNAMES.slice(0,12):TNAMES.filter(n=>n.toLowerCase().includes(lq)).slice(0,15);
  }
  function render(items){
    lst.innerHTML='';hi=-1;
    items.forEach((n,i)=>{
      const d=document.createElement('div');
      d.className='ddi';d.textContent=n;
      d.addEventListener('mousedown',e=>{e.preventDefault();pick(n);});
      d.addEventListener('touchstart',e=>{e.preventDefault();pick(n);},{passive:false});
      lst.appendChild(d);
    });
    lst.classList.toggle('open',items.length>0);
  }
  function pick(name){
    onSel(name);
    inp.value='';
    chp.innerHTML=`<span class="chip">${name} <span class="x" data-n="${name}">&#x2715;</span></span>`;
    chp.querySelector('.x').addEventListener('click',()=>{onSel(null);chp.innerHTML='';predict();});
    lst.classList.remove('open');
    predict();
  }
  inp.addEventListener('input',()=>render(matches(inp.value)));
  inp.addEventListener('focus',()=>render(matches(inp.value)));
  inp.addEventListener('blur',()=>setTimeout(()=>lst.classList.remove('open'),200));
  inp.addEventListener('keydown',e=>{
    const items=lst.querySelectorAll('.ddi');
    if(e.key==='ArrowDown'){hi=Math.min(hi+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('hl',i===hi));}
    else if(e.key==='ArrowUp'){hi=Math.max(hi-1,0);items.forEach((el,i)=>el.classList.toggle('hl',i===hi));}
    else if(e.key==='Enter'&&hi>=0){pick(items[hi].textContent);}
    else if(e.key==='Escape'){lst.classList.remove('open');inp.blur();}
  });
}

buildDrop('inA','listA','chipA',n=>{selA=n;});
buildDrop('inB','listB','chipB',n=>{selB=n;});

document.querySelectorAll('.round-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.round-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    roundOrd=parseInt(btn.dataset.ord);
    predict();
  });
});
</script>
