const TNAMES = Object.keys(TEAMS);

// ── Tab switching ────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab').forEach((t,i) =>
    t.classList.toggle('active', ['bracket','search'][i] === id));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
}

// ── Tournament schedule ───────────────────────────────────────
const ROUNDS = [
  {ord:0, label:'First Four',   dates:['20260317','20260318'], key:'first four'},
  {ord:1, label:'Round of 64',  dates:['20260319','20260320'], key:'1st round'},
  {ord:2, label:'Round of 32',  dates:['20260321','20260322'], key:'2nd round'},
  {ord:3, label:'Sweet 16',     dates:['20260326','20260327'], key:'sweet 16'},
  {ord:4, label:'Elite Eight',  dates:['20260328','20260329'], key:'elite 8'},
  {ord:5, label:'Final Four',   dates:['20260404'],            key:'final four'},
  {ord:6, label:'Championship', dates:['20260406'],            key:'national championship'},
];
const DATE_TO_ORD = {};
ROUNDS.forEach(r => r.dates.forEach(d => DATE_TO_ORD[d] = r.ord));

// ── ESPN name → Torvik name overrides ────────────────────────
const ESPN_MAP = {
  'Ohio State':'Ohio St.','Michigan St':'Michigan St.','Michigan State':'Michigan St.',
  'Kennesaw St':'Kennesaw St.','N Dakota St':'North Dakota St.',
  'NC State':'N.C. State','N.C. State':'N.C. State',
  "Hawai'i":'Hawaii','McNeese':'McNeese St.','SFA':'Stephen F. Austin',
  'Connecticut':'Connecticut','UConn':'Connecticut',
  'UMBC':'UMBC','VCU':'VCU','BYU':'BYU','TCU':'TCU','LSU':'LSU',
  'SMU':'SMU','UCF':'UCF','USC':'USC',
};

function normStr(s) {
  return s.toLowerCase().replace(/[.']/g,'').replace(/\s+/g,' ').trim();
}

function findTorvik(espnName) {
  if (!espnName || espnName === 'TBD') return null;
  // 1. Override map
  if (ESPN_MAP[espnName] && TEAMS[ESPN_MAP[espnName]]) return ESPN_MAP[espnName];
  // 2. Exact
  if (TEAMS[espnName]) return espnName;
  // 3. Add period to trailing St
  const withDot = espnName.replace(/\bSt\b/, 'St.').replace(/St$/, 'St.');
  if (TEAMS[withDot]) return withDot;
  // 4. Fuzzy token overlap
  const qTok = new Set(normStr(espnName).split(' ').filter(t => t.length > 2));
  let best = null, bestScore = 0;
  for (const name of TNAMES) {
    const nTok = new Set(normStr(name).split(' ').filter(t => t.length > 2));
    let inter = 0;
    qTok.forEach(t => { if (nTok.has(t)) inter++; });
    const score = inter / Math.max(qTok.size, nTok.size, 1);
    if (score > bestScore && score >= 0.4) { bestScore = score; best = name; }
  }
  return best;
}

// ── Fetch & parse bracket ─────────────────────────────────────
const ESPN = 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard';
let allGames = [], activeRound = null;

async function fetchDate(d) {
  try {
    const r = await fetch(ESPN + '?groups=100&limit=50&dates=' + d);
    return (await r.json()).events || [];
  } catch(e) { return []; }
}

function parseEvent(ev, roundOrd) {
  const comp = ev.competitions[0];
  const note = comp.notes && comp.notes[0] ? comp.notes[0].headline : '';
  const region = note.replace(/NCAA.*Championship - /,'').replace(/ - .*/,'').trim();
  const status = comp.status.type.name;
  const teams = comp.competitors.map(t => {
    const short = t.team.shortDisplayName;
    const seedRaw = t.seed || t.curatedRank?.current || null;
    const seed  = (seedRaw && seedRaw < 20) ? seedRaw : null;
    const score = (status !== 'STATUS_SCHEDULED' && t.score != null) ? parseInt(t.score) : null;
    return { espn: short, torvik: findTorvik(short), seed, score };
  });
  return { id: ev.id, date: ev.date, roundOrd, region, status, teams,
           overUnder: comp.odds && comp.odds[0] ? comp.odds[0].overUnder : null };
}

async function loadGames() {
  document.getElementById('game-list').innerHTML =
    '<div class="loading"><div class="spinner"></div>Loading bracket&hellip;</div>';
  const allDates = ROUNDS.flatMap(r => r.dates);
  const results  = await Promise.all(allDates.map(d => fetchDate(d)));
  const seen = new Set();
  allGames = [];
  allDates.forEach((d, i) => {
    const ord = DATE_TO_ORD[d];
    results[i].forEach(ev => {
      if (!seen.has(ev.id)) { seen.add(ev.id); allGames.push(parseEvent(ev, ord)); }
    });
  });
  if (allGames.length === 0) {
    document.getElementById('game-list').innerHTML =
      '<div class="err">Could not load bracket. Check connection and tap Refresh.</div>';
    return;
  }
  buildPills();
  // Default to today's round, or first available
  const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  setRound(DATE_TO_ORD[today] != null ? DATE_TO_ORD[today] : allGames[0].roundOrd);
}

// ── Round pills ───────────────────────────────────────────────
function buildPills() {
  const counts = {};
  allGames.forEach(g => counts[g.roundOrd] = (counts[g.roundOrd]||0)+1);
  const c = document.getElementById('round-pills');
  c.innerHTML = '';
  ROUNDS.forEach(r => {
    if (!counts[r.ord]) return;
    const p = document.createElement('div');
    p.className = 'rpill'; p.textContent = r.label; p.id = 'pill-'+r.ord;
    p.onclick = () => setRound(r.ord);
    c.appendChild(p);
  });
}

function setRound(ord) {
  activeRound = ord;
  document.querySelectorAll('.rpill').forEach(p => p.classList.remove('active'));
  const pill = document.getElementById('pill-'+ord);
  if (pill) { pill.classList.add('active'); pill.scrollIntoView({inline:'nearest',block:'nearest'}); }
  renderGames();
}

// ── Render games ──────────────────────────────────────────────
function renderGames() {
  const games = allGames.filter(g => g.roundOrd === activeRound);
  const list  = document.getElementById('game-list');
  if (!games.length) { list.innerHTML = '<div class="loading">No games for this round yet.</div>'; return; }
  list.innerHTML = '';
  games.forEach(g => {
    const card = document.createElement('div');
    card.className = 'game-card'; card.id = 'gc-'+g.id;
    card.innerHTML = cardHTML(g);
    card.onclick = () => togglePred(g.id);
    list.appendChild(card);
    const panel = document.createElement('div');
    panel.className = 'pred-panel'; panel.id = 'pp-'+g.id;
    list.appendChild(panel);
  });
}

function badgeHTML(s) {
  if (s==='STATUS_IN_PROGRESS') return '<span class="sbadge s-live">&#9679; LIVE</span>';
  if (s==='STATUS_FINAL')       return '<span class="sbadge s-final">FINAL</span>';
  return '<span class="sbadge s-sched">Upcoming</span>';
}

function fmtDate(iso) {
  try {
    return new Date(iso).toLocaleDateString('en-US',
      {month:'short',day:'numeric',hour:'numeric',minute:'2-digit',timeZoneName:'short'});
  } catch(e) { return ''; }
}

function cardHTML(g) {
  const [t1,t2] = g.teams;
  const scoreHTML = t => t.score != null ? '<div class="tscore">'+t.score+'</div>' : '';
  const ouStr = g.overUnder ? ' &bull; O/U '+g.overUnder : '';
  return `<div class="game-meta">
    <span>${g.region} &bull; ${fmtDate(g.date)}${ouStr}</span>
    ${badgeHTML(g.status)}</div>
  <div class="matchup">
    <div class="tblock">
      <div class="tseed">#${t1.seed||'?'}</div>
      <div class="tname">${t1.espn}</div>${scoreHTML(t1)}
    </div>
    <div class="vs">VS</div>
    <div class="tblock">
      <div class="tseed">#${t2.seed||'?'}</div>
      <div class="tname">${t2.espn}</div>${scoreHTML(t2)}
    </div>
  </div>`;
}

// ── Tap to predict ────────────────────────────────────────────
let openId = null;
function togglePred(id) {
  const card  = document.getElementById('gc-'+id);
  const panel = document.getElementById('pp-'+id);
  if (openId && openId !== id) {
    document.getElementById('gc-'+openId)?.classList.remove('selected');
    const op = document.getElementById('pp-'+openId);
    if (op) { op.classList.remove('open'); op.innerHTML=''; }
  }
  if (panel.classList.contains('open')) {
    panel.classList.remove('open'); panel.innerHTML='';
    card.classList.remove('selected'); openId=null; return;
  }
  card.classList.add('selected'); panel.classList.add('open'); openId=id;
  const g = allGames.find(x => x.id === id);
  panel.innerHTML = buildPredHTML(g);
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── Ridge model ───────────────────────────────────────────────
function feats(a, b, r) {
  const sad=a.adj_d+b.adj_d, sao=a.adj_o+b.adj_o;
  const aoe=(a.off_efg+b.off_efg)/2, aoor=(a.off_orb+b.off_orb)/2;
  const sc=aoor*aoe, ade=(a.def_efg+b.def_efg)/2;
  const adob=(a.def_orb+b.def_orb)/2, adftr=(a.def_ftr+b.def_ftr)/2;
  const aoftr=(a.off_ftr+b.off_ftr)/2, td=Math.abs(a.adj_t-b.adj_t);
  const bd=Math.abs(a.barthag-b.barthag), adtor=(a.def_to_rate+b.def_to_rate)/2;
  const odm=(a.adj_o-b.adj_d)+(b.adj_o-a.adj_d);
  return { h1:[sad,sao,sc,ade,bd,adob,adftr,td,aoftr,adtor,odm],
           h2:[sao,sad,ade,sc,td,adtor*ade,adob,(a.wab+b.wab)/2,r,odm,sao/sad] };
}
function ridge(f, m) {
  let y = m.intercept;
  for (let i=0;i<f.length;i++) y += m.coef[i]*(f[i]-m.scaler_mean[i])/m.scaler_std[i];
  return y;
}
function fv(v) { return v.toFixed(1); }

function projRow(lbl, modelVal, market, isTot) {
  const valCls = isTot ? 'proj-val tot' : 'proj-val';
  let mktHTML = '';
  if (market != null) {
    const edge = modelVal - market;
    const isPos = edge >= 0;
    const ec = isPos ? 'ep' : 'en';
    const sign = isPos ? '+' : '';
    const pct = Math.min(Math.abs(edge) / 10, 1) * 100;
    mktHTML = `<div class="proj-mkt">
      <span class="proj-mkt-lbl">Market <span class="proj-mkt-num">${market}</span></span>
      <span class="proj-edge ${ec}">${sign}${edge.toFixed(1)}</span>
      <span class="proj-lean ${isPos?'over':'under'}">${isPos?'OVER':'UNDER'}</span>
    </div>
    <div class="ebar"><div class="ebar-fill ${ec}" style="width:${pct.toFixed(1)}%"></div></div>`;
  }
  return `<div class="proj-card ${market!=null?(modelVal-market>=0?'ep':'en'):''}">
    <div class="proj-header">
      <span class="proj-lbl">${lbl}</span>
      <span class="${valCls}">${fv(modelVal)}</span>
    </div>${mktHTML}
  </div>`;
}

function buildPredHTML(g) {
  const [t1,t2] = g.teams;
  if (!t1.torvik || !t2.torvik || t1.espn==='TBD' || t2.espn==='TBD') {
    return '<div style="text-align:center;padding:14px;color:#475569;font-size:.82rem">Matchup TBD — check back after earlier games finish.</div>';
  }
  const a=TEAMS[t1.torvik], b=TEAMS[t2.torvik];
  if (!a||!b) {
    return `<div style="text-align:center;padding:12px;color:#ef4444;font-size:.82rem">Stats not found: ${t1.espn} / ${t2.espn}</div>`;
  }
  const f12=feats(a,b,g.roundOrd);
  const h1=ridge(f12.h1,MODEL.h1), h2=ridge(f12.h2,MODEL.h2), tot=h1+h2;
  return `<div class="pred-title">Game Projection</div>
  <div class="pred-matchup">${t1.espn} vs ${t2.espn}</div>
  ${projRow('First Half Total',  h1,  null,        false)}
  ${projRow('Second Half Total', h2,  null,        false)}
  ${projRow('Full Game Total',   tot, g.overUnder, true)}`;
}

// ── Manual search ─────────────────────────────────────────────
let selA=null, selB=null, sRound=1;
function buildDrop(inId, listId, chipId, setSel) {
  const inp=document.getElementById(inId);
  const lst=document.getElementById(listId);
  const chp=document.getElementById(chipId);
  let hi=-1;
  const mtch = q => q.length<1 ? TNAMES.slice(0,12)
    : TNAMES.filter(n=>n.toLowerCase().includes(q.toLowerCase())).slice(0,15);
  const render = items => {
    lst.innerHTML=''; hi=-1;
    items.forEach(n => {
      const d=document.createElement('div'); d.className='ddi'; d.textContent=n;
      d.addEventListener('mousedown',e=>{e.preventDefault();pick(n);});
      d.addEventListener('touchstart',e=>{e.preventDefault();pick(n);},{passive:false});
      lst.appendChild(d);
    });
    lst.classList.toggle('open', items.length>0);
  };
  const pick = name => {
    setSel(name); inp.value='';
    chp.innerHTML='<span class="chip">'+name+
      '<span class="x" data-id="'+chipId+'">&times;</span></span>';
    chp.querySelector('.x').onclick = () => { setSel(null); chp.innerHTML=''; doSearchPred(); };
    lst.classList.remove('open');
    doSearchPred();
  };
  inp.addEventListener('input', () => render(mtch(inp.value)));
  inp.addEventListener('focus', () => render(mtch(inp.value)));
  inp.addEventListener('blur',  () => setTimeout(()=>lst.classList.remove('open'),200));
  inp.addEventListener('keydown', e => {
    const items=lst.querySelectorAll('.ddi');
    if(e.key==='ArrowDown'){hi=Math.min(hi+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('hl',i===hi));}
    else if(e.key==='ArrowUp'){hi=Math.max(hi-1,0);items.forEach((el,i)=>el.classList.toggle('hl',i===hi));}
    else if(e.key==='Enter'&&hi>=0){pick(items[hi].textContent);}
    else if(e.key==='Escape'){lst.classList.remove('open');}
  });
}
function doSearchPred() {
  const el=document.getElementById('search-result');
  if(!selA||!selB||selA===selB){el.innerHTML='';return;}
  const fakeG={id:'search',roundOrd:sRound,teams:[{espn:selA,torvik:selA},{espn:selB,torvik:selB}],overUnder:null};
  el.innerHTML='<div class="card">'+buildPredHTML(fakeG)+'</div>';
}
buildDrop('inA','listA','chipA', n=>{selA=n;});
buildDrop('inB','listB','chipB', n=>{selB=n;});
document.querySelectorAll('.round-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.round-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); sRound=parseInt(btn.dataset.ord); doSearchPred();
  });
});

// ── Init ──────────────────────────────────────────────────────
loadGames();
</script>
